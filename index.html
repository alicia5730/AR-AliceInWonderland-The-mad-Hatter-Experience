<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Wonderland</title>
    <style>
        :root {
            --cream: #f8f3e8;
            --olive: #63651f;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--cream);
        }

        canvas {
            display: block;
            touch-action: manipulation;
        }

        .overlay {
            position: fixed;
            inset: 0;
            z-index: 5;
            display: grid;
            place-items: center;
            pointer-events: none;
        }

        .frame {
            width: min(92vw, 980px);
            height: min(84vh, 640px);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 32px;
            background: transparent;
        }

        h1 {
            margin: 0;
            font-size: clamp(2.5rem, 5vw, 3.6rem);
            font-weight: 400;
            letter-spacing: 0.02em;
            text-align: center;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
        }

        .content {
            margin-top: auto;
            margin-bottom: 110px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            pointer-events: auto;
            transition: opacity 0.45s ease, transform 0.45s ease;
        }

        .content.hidden {
            opacity: 0;
            transform: translateY(16px);
            pointer-events: none;
        }

        .enter-button {
            min-width: 270px;
            padding: 16px 28px;
            border: 0;
            border-radius: 10px;
            background: var(--olive);
            color: var(--cream);
            font-size: 1.05rem;
            font-family: inherit;
            cursor: pointer;
        }

        .helper {
            margin: 0;
            font-size: clamp(1.35rem, 3vw, 1.9rem);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.45);
        }

        .status {
            position: fixed;
            left: 16px;
            bottom: 16px;
            z-index: 6;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: rgba(248, 243, 232, 0.86);
            backdrop-filter: blur(10px);
            font-size: 0.95rem;
        }

        body.ready-to-enter {
            cursor: pointer;
        }

        .loading-screen {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: grid;
            place-items: center;
            background: #000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.55s ease;
        }

        .loading-screen.show {
            opacity: 1;
            pointer-events: auto;
        }

        .loading-stage {
            position: relative;
            width: min(520px, 86vw);
            height: min(380px, 62vh);
            display: grid;
            place-items: center;
        }

        #loadingCanvas {
            width: 100%;
            height: 100%;
            display: block;
            filter:
                drop-shadow(0 0 18px rgba(119, 255, 68, 0.55))
                drop-shadow(0 0 34px rgba(170, 86, 255, 0.45));
        }

        .loading-text {
            position: absolute;
            left: 50%;
            bottom: 8px;
            transform: translateX(-50%);
            color: var(--cream);
            font-size: clamp(1rem, 3vw, 1.25rem);
            letter-spacing: 0.08em;
            text-shadow: 0 0 18px rgba(221,189,255,.8);
            white-space: nowrap;
        }

        .rotate-warning{
            position:fixed;
            inset:0;
            z-index:999;
            display:none;
            place-items:center;
            padding:28px;
            background:
                linear-gradient(rgba(0,0,0,.82), rgba(0,0,0,.9));
            text-align:center;
            color:#fff6e8;
        }

        .rotate-card{
            width:min(420px, 92vw);
            padding:28px 24px;
            background:rgba(79,31,122,.92);
            border:3px solid rgba(255,229,111,.88);
            box-shadow:
                0 0 28px rgba(255,229,111,.52),
                0 0 54px rgba(214,120,214,.46),
                0 18px 38px rgba(0,0,0,.45);
            clip-path:polygon(1% 9%,7% 5%,16% 7%,24% 4%,37% 6%,48% 3%,60% 6%,73% 4%,85% 7%,97% 5%,99% 92%,91% 96%,79% 93%,65% 97%,52% 94%,39% 97%,26% 94%,14% 97%,2% 92%);
        }

        .rotate-icon{
            font-family:Georgia,"Times New Roman",serif;
            font-size:58px;
            margin-bottom:12px;
            color:#ffd56a;
            text-shadow:0 0 20px rgba(255,213,106,.9);
            animation:turnPhone 1.25s ease-in-out infinite alternate;
        }

        .rotate-card h2{
            font-size:clamp(27px, 8vw, 39px);
            line-height:1.05;
            margin-bottom:12px;
            color:#ffd56a;
            text-shadow:0 2px 8px rgba(0,0,0,.45);
        }

        .rotate-card p{
            font-family:Georgia,"Times New Roman",serif;
            font-size:18px;
            line-height:1.35;
        }

        @keyframes turnPhone{
            from{ transform:rotate(-8deg) scale(1); }
            to{ transform:rotate(8deg) scale(1.06); }
        }

        @media (orientation: portrait) and (max-width: 900px){
            .rotate-warning{ display:grid; }
        }

        /* Phone landscape responsive mode */
        @media (orientation: landscape) and (max-height: 520px) and (max-width: 950px) {
            .frame {
                width: 100vw;
                height: 100svh;
                padding-top: max(10px, env(safe-area-inset-top));
                justify-content: flex-start;
            }

            h1 {
                max-width: 82vw;
                font-size: clamp(1.45rem, 5.2vw, 2.25rem);
                line-height: 1.05;
            }

            .content {
                margin-bottom: max(16px, env(safe-area-inset-bottom));
                gap: 8px;
            }

            .enter-button {
                min-width: 210px;
                padding: 11px 20px;
                font-size: .92rem;
                border-radius: 9px;
            }

            .helper {
                font-size: clamp(.9rem, 2.5vw, 1.15rem);
            }

            .status {
                left: max(8px, env(safe-area-inset-left));
                bottom: max(8px, env(safe-area-inset-bottom));
                padding: 7px 10px;
                font-size: .72rem;
                opacity: .78;
            }

            .loading-stage {
                width: min(360px, 58vw);
                height: min(240px, 76vh);
            }

            .rotate-card {
                padding: 20px 22px;
            }

            .rotate-icon {
                font-size: 44px;
                margin-bottom: 6px;
            }

            .rotate-card h2 {
                font-size: clamp(1.5rem, 5vw, 2rem);
                margin-bottom: 8px;
            }

            .rotate-card p {
                font-size: 15px;
            }
        }

        @media (max-width: 420px) {
            h1 {
                font-size: clamp(2rem, 10vw, 2.8rem);
                max-width: 92vw;
            }

            .enter-button {
                min-width: min(270px, 82vw);
            }

            .helper {
                max-width: 88vw;
                text-align: center;
            }
        }


    </style>
    <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div class="overlay">
        <div class="frame">
            <h1>Welcome, curious wanderers, to Wonderland!</h1>
            <div class="content" id="content">
                <button class="enter-button" id="enterButton" type="button">Into the rabbit hole</button>
                <p class="helper">Tap anywhere to tumble down the rabbit hole</p>
            </div>
        </div>
    </div>

    <div class="loading-screen" id="loadingScreen" aria-hidden="true">
        <div class="loading-stage">
            <canvas id="loadingCanvas"></canvas>
            <div class="loading-text">Loading...</div>
        </div>
    </div>

<div class="smile"></div>
            <div class="loading-text">Loading...</div>
        </div>
    </div>

    <div class="status" id="status">Rabbit hole wordt geladen...</div>

    <audio id="fallingSound" src="assets/falling.mp3" preload="auto"></audio>

    <section class="rotate-warning" aria-label="Rotate device warning">
        <div class="rotate-card">
            <div class="rotate-icon">↻</div>
            <h2>Turn your phone sideways</h2>
            <p>Wonderland works best in landscape mode. Turn your phone sideways to play this scene properly.</p>
        </div>
    </section>


    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const content = document.getElementById('content');
        const enterButton = document.getElementById('enterButton');
        const statusEl = document.getElementById('status');
        const loadingScreen = document.getElementById('loadingScreen');
        const loadingCanvas = document.getElementById('loadingCanvas');
        const fallingSound = document.getElementById('fallingSound');
        document.body.classList.add('ready-to-enter');

        const baseConfig = {
            modelPosition: new THREE.Vector3(-0.7, 0, 0),
            modelRotation: new THREE.Euler(-1.4748, 1.5795, 1.7453),
            modelScale: 20.56,
            spinSpeed: 2.44,
            cameraPosition: new THREE.Vector3(-1.5, 17, 2),
            cameraTarget: new THREE.Vector3(1, -1, -1.5)
        };

        let loadedScene = null;
        let journeyStarted = false;
        let journeyFinished = false;
        let journeyStartTime = 0;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);

        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.copy(baseConfig.cameraPosition);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.7));

        const keyLight = new THREE.DirectionalLight(0xdce88a, 2.7);
        keyLight.position.set(4, 8, 4);
        scene.add(keyLight);

        const fillLight = new THREE.DirectionalLight(0x9fb34d, 1.9);
        fillLight.position.set(-5, 6, 2);
        scene.add(fillLight);

        const pointLight = new THREE.PointLight(0xb4c85d, 18, 50, 2);
        pointLight.position.set(0, 0, 6);
        scene.add(pointLight);

        const modelWrap = new THREE.Group();
        modelWrap.position.copy(baseConfig.modelPosition);
        modelWrap.rotation.copy(baseConfig.modelRotation);
        scene.add(modelWrap);

        const spinGroup = new THREE.Group();
        modelWrap.add(spinGroup);

        function setStatus(text) {
            statusEl.textContent = text;
        }


        // Cheshire Cat smile loading GLB scene
        const loadingScene = new THREE.Scene();
        const loadingCamera = new THREE.PerspectiveCamera(36, 1, 0.1, 100);
        loadingCamera.position.set(0, 0.15, 4.2);

        const loadingRenderer = new THREE.WebGLRenderer({
            canvas: loadingCanvas,
            antialias: true,
            alpha: true,
            powerPreference: "high-performance"
        });
        loadingRenderer.setClearColor(0x000000, 0);
        loadingRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        loadingRenderer.outputColorSpace = THREE.SRGBColorSpace;

        loadingScene.add(new THREE.AmbientLight(0xffffff, 1.9));

        const loadingKeyLight = new THREE.DirectionalLight(0xbaff75, 2.8);
        loadingKeyLight.position.set(2.6, 3.4, 4);
        loadingScene.add(loadingKeyLight);

        const loadingPurpleLight = new THREE.PointLight(0xb86dff, 18, 10, 1.8);
        loadingPurpleLight.position.set(-1.6, 0.8, 2.8);
        loadingScene.add(loadingPurpleLight);

        const loadingWrap = new THREE.Group();
        loadingScene.add(loadingWrap);
        let loadingSmileModel = null;

        function resizeLoadingRenderer() {
            const rect = loadingCanvas.getBoundingClientRect();
            const width = Math.max(1, Math.floor(rect.width));
            const height = Math.max(1, Math.floor(rect.height));
            loadingRenderer.setSize(width, height, false);
            loadingCamera.aspect = width / height;
            loadingCamera.updateProjectionMatrix();
        }

        function normalizeLoadingModel(object3d, desiredSize) {
            object3d.position.set(0, 0, 0);
            object3d.rotation.set(0, 0, 0);
            object3d.scale.set(1, 1, 1);
            object3d.updateWorldMatrix(true, true);

            const box = new THREE.Box3().setFromObject(object3d);
            const center = new THREE.Vector3();
            const size = new THREE.Vector3();
            box.getCenter(center);
            box.getSize(size);

            const maxAxis = Math.max(size.x, size.y, size.z) || 1;
            object3d.position.sub(center);
            object3d.scale.setScalar(desiredSize / maxAxis);
        }

        function boostLoadingSmileMaterials(root) {
            root.traverse((child) => {
                if (!child.isMesh || !child.material) return;

                const materials = Array.isArray(child.material) ? child.material : [child.material];

                materials.forEach((material) => {
                    material.side = THREE.DoubleSide;
                    material.transparent = false;
                    material.opacity = 1;

                    if ("emissive" in material) {
                        material.emissive = new THREE.Color(0x76ff45);
                        material.emissiveIntensity = 0.85;
                    }

                    if ("roughness" in material) material.roughness = 0.72;
                    if ("metalness" in material) material.metalness = 0.05;
                    material.needsUpdate = true;
                });
            });
        }

        // Centreert en schaalt 3D-object naar gewenste grootte
        function normalizeObjectForScene(object3d, desiredSize) {
            object3d.updateWorldMatrix(true, true);

            if (!object3d.userData.centeredForScene) {
                const box = new THREE.Box3().setFromObject(object3d);
                const center = new THREE.Vector3();
                box.getCenter(center);
                object3d.position.sub(center);
                object3d.userData.centeredForScene = true;
            }

            if (!object3d.userData.baseMaxAxis) {
                object3d.updateWorldMatrix(true, true);
                const box = new THREE.Box3().setFromObject(object3d);
                const size = new THREE.Vector3();
                box.getSize(size);
                object3d.userData.baseMaxAxis = Math.max(size.x, size.y, size.z) || 1;
            }

            object3d.scale.setScalar(desiredSize / object3d.userData.baseMaxAxis);
        }

        // Verbetert materiaal eigenschappen voor betere visuele uitstraling
        function boostMaterials(root) {
            root.traverse((child) => {
                if (!child.isMesh || !child.material) return;
                const materials = Array.isArray(child.material) ? child.material : [child.material];
                materials.forEach((material) => {
                    material.side = THREE.DoubleSide;
                    if ('metalness' in material) material.metalness = Math.min(material.metalness ?? 0, 0.35);
                    if ('roughness' in material) material.roughness = Math.min(material.roughness ?? 1, 0.95);
                    if ('emissive' in material && material.color) {
                        material.emissive.copy(material.color).multiplyScalar(0.07);
                        material.emissiveIntensity = 0.55;
                    }
                    material.needsUpdate = true;
                });
            });
        }

        // Maakt fallback 3D-model als GLB niet laadt
        function createFallbackHole() {
            const group = new THREE.Group();
            for (let i = 0; i < 18; i++) {
                const mesh = new THREE.Mesh(
                    new THREE.TorusGeometry(3.2 + i * 0.16, 0.18, 10, 48),
                    new THREE.MeshStandardMaterial({
                        color: i % 2 === 0 ? 0x607020 : 0x313610,
                        emissive: 0x151805,
                        emissiveIntensity: 0.6
                    })
                );
                mesh.rotation.x = Math.PI / 2;
                mesh.position.y = -i * 0.38;
                group.add(mesh);
            }
            return group;
        }

        // Laadt 3D-model (GLB) of fallback als dit mislukt
        const loader = new GLTFLoader();

        loader.load(
            'assets/Loading screen smile.glb',
            (gltf) => {
                loadingSmileModel = gltf.scene;
                boostLoadingSmileMaterials(loadingSmileModel);
                loadingWrap.add(loadingSmileModel);
                normalizeLoadingModel(loadingSmileModel, 2.55);
                loadingSmileModel.rotation.set(0, 0, 0);
            },
            undefined,
            (error) => {
                console.warn('Loading smile GLB failed:', error);
            }
        );

        loader.load(
            'assets/down_the_rabbit_hole_-_alice_in_wonderland.glb',
            (gltf) => {
                loadedScene = gltf.scene;
                boostMaterials(loadedScene);
                spinGroup.add(loadedScene);
                normalizeObjectForScene(loadedScene, baseConfig.modelScale);
                setStatus('Rabbit hole geladen.');
            },
            undefined,
            (error) => {
                loadedScene = createFallbackHole();
                spinGroup.add(loadedScene);
                normalizeObjectForScene(loadedScene, baseConfig.modelScale);
                setStatus(`GLB laden mislukt, fallback zichtbaar. ${error?.message || error}`);
            }
        );

        function isPortraitBlocked() {
            return window.matchMedia('(orientation: portrait) and (max-width: 900px)').matches;
        }

        function playFallingSound() {
            if (!fallingSound) return;

            fallingSound.currentTime = 0;
            fallingSound.volume = 0.9;

            const playPromise = fallingSound.play();
            if (playPromise !== undefined) {
                playPromise.catch((error) => {
                    console.warn('Falling sound could not play:', error);
                });
            }
        }

        function startJourney() {
            if (isPortraitBlocked()) {
                setStatus('Turn your phone sideways first.');
                return;
            }

            if (journeyStarted) return;
            journeyStarted = true;
            playFallingSound();
            journeyStartTime = performance.now();
            content.classList.add('hidden');
            document.body.classList.remove('ready-to-enter');
            setStatus('Falling into the rabbit hole...');
        }

        document.addEventListener('pointerdown', (event) => {
            if (journeyStarted) return;
            startJourney();
        });

        enterButton.addEventListener('click', (event) => {
            event.stopPropagation();
            startJourney();
        });

        const clock = new THREE.Clock();

        // Hoofd animation loop: draait model, animates camera bij klik
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            if (journeyStarted) {
                // Berekent voortgang van vallen (4.8 seconden)
                const elapsed = (performance.now() - journeyStartTime) / 1000;
                const progress = Math.min(elapsed / 4.8, 1);
                const eased = 1 - Math.pow(1 - progress, 3);

                spinGroup.rotation.y += baseConfig.spinSpeed * 0.02;

                // Interpoleert camera positie en kijk-richting
                camera.position.x = THREE.MathUtils.lerp(baseConfig.cameraPosition.x, 0.15, eased);
                camera.position.y = THREE.MathUtils.lerp(baseConfig.cameraPosition.y, 2.6, eased);
                camera.position.z = THREE.MathUtils.lerp(baseConfig.cameraPosition.z, 0.35, eased);
                camera.lookAt(
                    THREE.MathUtils.lerp(baseConfig.cameraTarget.x, 0, eased),
                    THREE.MathUtils.lerp(baseConfig.cameraTarget.y, -1.4, eased),
                    THREE.MathUtils.lerp(baseConfig.cameraTarget.z, 0, eased)
                );

                // Navigeert naar volgende pagina wanneer animatie klaar is
                if (progress >= 1 && !journeyFinished) {
                    journeyFinished = true;
                    loadingScreen.classList.add('show');
                    setStatus('Loading next scene...');
                    setTimeout(() => {
                        window.location.href = 'drink-me.html';
                    }, 5000);
                    return;
                }
            } else {
                camera.position.copy(baseConfig.cameraPosition);
                camera.lookAt(baseConfig.cameraTarget);
                spinGroup.rotation.y = 0;
            }

            // Zachte bobbing van model voor rustiger effect
            if (!journeyStarted && loadedScene) {
                loadedScene.position.y = Math.sin(t * 0.7) * 0.02;
            }

            if (loadingScreen.classList.contains('show')) {
                resizeLoadingRenderer();

                if (loadingSmileModel) {
                    const pulse = 1 + Math.sin(t * 2.1) * 0.035;
                    loadingSmileModel.scale.multiplyScalar(pulse / (loadingSmileModel.userData.lastPulse || 1));
                    loadingSmileModel.userData.lastPulse = pulse;
                    loadingWrap.rotation.y = Math.sin(t * 0.75) * 0.08;
                    loadingWrap.rotation.z = Math.sin(t * 0.55) * 0.025;
                }

                loadingRenderer.render(loadingScene, loadingCamera);
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            resizeLoadingRenderer();
        });
    </script>
    <script src="js/orientation-guard.js" defer></script>
</body>
</html>
